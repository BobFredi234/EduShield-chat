<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="profile">
            <div class="avatar"></div>
            <div>
                <h3>Jesse Doe</h3>
                <span class="status">Online</span>
            </div>
        </div>

        <div class="tabs">
            <button class="active">Chats</button>
            <button>Contacts</button>
        </div>

        <div class="empty-chat">
            <div class="chat-icon">💬</div>
            <h4>No conversations yet</h4>
            <p>Start a new chat by selecting a contact from the contacts tab</p>
            <button class="contact-btn">Find contacts</button>
        </div>

    </div>

    <!-- Main content -->
    <div class="main">

        <div class="center-message">
            <div class="big-icon">💬</div>
            <h2>Select a conversation</h2>
            <p>Choose a contact from the sidebar to start chatting or continue a previous conversation.</p>
        </div>

    </div>

</div>

</body>
</html>
